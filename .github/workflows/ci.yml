name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: lint + test (CPU only)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU torch
        run: |
          python -m pip install --upgrade pip
          # CPU wheel keeps CI quick and avoids CUDA on GitHub-hosted runners.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1"

      - name: Install package (core + dev + nlp; skip quant/eval to keep CI small)
        run: |
          python -m pip install -e ".[dev,nlp,hub]"

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest (CPU-only; GPU tests auto-skipped)
        env:
          LLM_GPU_LAB_NO_DOWNLOAD: "1"
        run: python -m pytest -q

      - name: Placeholder audit
        run: bash scripts/audit_placeholders.sh
